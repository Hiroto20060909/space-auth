<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宇宙船認証システム</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at center,#001a33,#000814);
    font-family:Arial,sans-serif;
    overflow:hidden;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.3;
}

.panel{
    z-index:1;
    text-align:center;
    background:rgba(0,20,40,0.85);
    border:2px solid #00ffff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 0 30px #00ffff;
}

h1{
    color:#00ffff;
    margin-bottom:30px;
    letter-spacing:3px;
}

input{
    width:220px;
    padding:15px;
    font-size:24px;
    text-align:center;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    margin-top:20px;
    padding:12px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="panel">

<h1>ACCESS CODE</h1>

<input
type="password"
id="password"
placeholder="****"
maxlength="4">

<br>

<button onclick="checkPassword()">
ENTER
</button>

</div>

<script>

function checkPassword(){

const password =
document.getElementById("password").value;

if(password === "3411"){
    window.location.href = "success.html";
}
else{
    window.location.href = "failed.html";
}

}

document.getElementById("password")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
    checkPassword();
}

});

</script>

</body>
</html>
